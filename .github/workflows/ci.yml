name: ci

# Why this exists: this repo runs production (blog +网盘 + WebDAV) and its 60
# backend tests had never run anywhere but one laptop. The sibling repo learned
# this the hard way — its site generator was broken for a whole milestone because
# nothing built it on push. Same failure mode, higher stakes here.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # This repo is public, and the convention is that the server's real IP and ssh
  # username live only in a private local note — the tree writes <user>@<server>.
  # That convention was enforced by hand exactly once (a 2026-06-23 scrub commit);
  # eleven days later a deploy doc put `ssh <user>@<ip>` straight back, and it sat on
  # public main unnoticed. A convention nothing checks is a convention that decays,
  # so it is a check now. See scripts/check-no-server-identity.py for why it
  # resolves the site's own DNS instead of hardcoding what it is looking for.
  secrets:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 so the trailer check below can see the commit range's
      # history; the other guards here only look at the tree and do not need it.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: no server identity in the tree
        run: python3 scripts/check-no-server-identity.py

      # No Claude attribution in new commits. The rule is suppressed at the Claude
      # Code settings source, but that is per-machine/per-session — a different
      # machine or a session whose system prompt insists will slip it in. This is
      # the backstop that does not depend on who committed: commit-msg catches it
      # locally (an opt-in hook), this catches it authoritatively. 20 such trailers
      # once had to be force-pushed out of history; this exists so that cannot recur.
      - name: no Claude attribution in commit messages
        run: |
          if [ "${{ github.event_name }}" = pull_request ]; then
            range="origin/${{ github.base_ref }}...HEAD"
          elif [ "${{ github.event.before }}" = 0000000000000000000000000000000000000000 ]; then
            range="HEAD~1..HEAD"
          else
            range="${{ github.event.before }}..HEAD"
          fi
          python3 scripts/check-no-claude-trailer.py --range "$range"

      # .gitignore keeps the .env *file* out of the tree; it does not stop a key
      # value being pasted into a tracked source file or doc — a mistake an agent
      # that reads .env for context is prone to. gitleaks scans the tree for that.
      # Pinned binary rather than the action: no org-license prompt, and the
      # ruleset version is pinned like every other tool here. --no-git because this
      # job is checkout-only, so the tree is tracked files only (no .venv/node_modules).
      - name: no secret values in tracked files
        run: |
          v=8.18.4
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${v}/gitleaks_${v}_linux_x64.tar.gz" | tar xz gitleaks
          ./gitleaks detect --no-git --source . --config .gitleaks.toml --redact --exit-code 1

      # The deploy and rollback scripts are the least-exercised code in the repo:
      # nothing runs them until production is already on fire, which is the worst
      # possible moment to find out `sed -i` ate a symlink. shellcheck is not a
      # test — nothing here boots a server — but it is the only automated opinion
      # they get, and it is the one that caught `rm -rf "$APP/lib"` running as root
      # with no guard on $APP being non-empty.
      - name: shellcheck deploy scripts
        run: shellcheck backend-dawn/deploy/*.sh backend-dawn/build.sh scripts/fetch-dawn.sh

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # backend-dawn is written in Dawn, so building it needs the sibling repo's
      # compiler. It used to be checked out and built from main on every run.
      # That was deliberate — "compile against the language as it is today" — but
      # the price was that any commit in dawn-lang could turn this repo red
      # without this repo changing, and nothing recorded which compiler built a
      # given backend. Production runs on this; it had outgrown that trade.
      #
      # build.sh now resolves the toolchain through scripts/fetch-dawn.sh, which
      # reads .dawn-version — the same file this laptop reads. Bumping the
      # compiler is a commit here, reviewable and revertable like any other.
      - name: cache the pinned dawn toolchain
        uses: actions/cache@v4
        with:
          path: .dawn
          key: dawn-${{ hashFiles('.dawn-version') }}

      # dawn.toml's [java-deps] are resolved by coursier, which caches here.
      # Keyed on dawn.toml since that is the single source of truth for versions.
      - name: cache java-deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/coursier
          key: coursier-${{ hashFiles('backend-dawn/dawn.toml') }}
          restore-keys: coursier-

      # build.sh = fetch the pinned dawn, then `dawn test .` and `dawn build .`.
      # The tests are hermetic (no .env, no DB, no libsimple, no live host);
      # `dawn build` fetches java-deps into backend-dawn/lib/ next to the jar,
      # which is what the jar's relative manifest Class-Path points at.
      - name: backend tests + jar
        run: ./backend-dawn/build.sh

      # The deployable artifact. The jar is deliberately NOT in git: a build
      # output committed by hand drifts from src/ silently, and its lib/ is
      # gitignored anyway, so the in-repo jar could never run from a checkout.
      # What gets deployed is now what CI built and tested, from a known commit.
      # jar + lib/ travel together — the jar's manifest Class-Path is relative.
      - name: upload deployable
        uses: actions/upload-artifact@v4
        with:
          name: backend-dawn-${{ github.sha }}
          path: |
            backend-dawn/backend-dawn.jar
            backend-dawn/lib/
          if-no-files-found: error
          retention-days: 30

  # The FastAPI backend is retired from serving (M6 moved every route to Dawn on
  # :8001) but it is not dead code: it is the emergency rollback target —
  # deploy/rollback-to-fastapi.sh points nginx back at uvicorn :8000, against the
  # same DB. A rollback target nothing exercises is not a rollback target, it is
  # a guess. It also remains the reference implementation the contract_*.py
  # scripts diff the Dawn backend against.
  python-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 3.10, not latest: production is Ubuntu 22.04, whose python3 is 3.10, and
      # the code is held to that baseline. Testing on newer tests what does not ship.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: install
        run: pip install -r requirements-dev.txt
        working-directory: backend

      # From the repo root: pyproject.toml covers backend/, backend-dawn/scripts/
      # and deploy/, not just the one package.
      - name: ruff
        run: |
          ruff check .
          ruff format --check .

      # The simple-tokenizer test (2-char CJK + pinyin — the reason the extension
      # was chosen at all) skips everywhere else: the .so is deliberately not in
      # git, and neither the dev laptop nor the server can reach GitHub releases.
      # A runner can, so this is the one place that assertion ever runs.
      #
      # Deliberately NOT continue-on-error: the test skips itself when the .so is
      # absent, so tolerating a failed fetch would silently restore the very state
      # this job exists to end — green CI that never ran the assertion. Failing
      # here is also real news: this same script is how the server gets the .so.
      - name: fetch the simple fts extension
        run: python scripts/fetch_simple_ext.py
        working-directory: backend

      # -rs so a skip is visible in the log rather than a silent dot.
      #
      # Coverage reports, deliberately without a threshold. A number to defend
      # invites tests written to move the number; what is wanted here is only
      # visibility into which modules nothing touches. Not in pytest.ini either,
      # so a local `pytest` stays fast.
      - name: tests
        run: pytest -rs --cov=app --cov-report=term-missing:skip-covered
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # npm ci, not install: it fails loudly when the lockfile and package.json
      # disagree, which is the whole point of having the lockfile committed.
      - name: install
        run: npm ci
        working-directory: frontend

      - name: lint
        run: npm run lint
        working-directory: frontend

      - name: formatting
        run: npm run format:check
        working-directory: frontend

      - name: build
        run: npm run build
        working-directory: frontend
