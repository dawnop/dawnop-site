name: ci

# Why this exists: this repo runs production (blog +网盘 + WebDAV) and its 60
# backend tests had never run anywhere but one laptop. The sibling repo learned
# this the hard way — its site generator was broken for a whole milestone because
# nothing built it on push. Same failure mode, higher stakes here.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # backend-dawn is written in Dawn, so building it needs the compiler from
      # the sibling repo. Tracking main (rather than pinning) is deliberate: the
      # backend has to compile with the language as it actually is today, and a
      # cross-repo break should surface here rather than at deploy time.
      - uses: actions/checkout@v4
        with:
          repository: dawnop/dawn-lang
          path: .dawn-lang

      - uses: gradle/actions/setup-gradle@v4

      - name: build the dawn compiler
        run: ./gradlew :compiler:fatJar
        working-directory: .dawn-lang

      # dawn.toml's [java-deps] are resolved by coursier, which caches here.
      # Keyed on dawn.toml since that is the single source of truth for versions.
      - name: cache java-deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/coursier
          key: coursier-${{ hashFiles('backend-dawn/dawn.toml') }}
          restore-keys: coursier-

      # build.sh = `dawn test .` then `dawn build .`. The tests are hermetic (no
      # .env, no DB, no libsimple, no live host); `dawn build` fetches java-deps
      # into backend-dawn/lib/ next to the jar, which is what the jar's relative
      # manifest Class-Path points at.
      - name: backend tests + jar
        run: |
          export PATH="$GITHUB_WORKSPACE/.dawn-lang/bin:$PATH"
          ./backend-dawn/build.sh

      # The deployable artifact. The jar is deliberately NOT in git: a build
      # output committed by hand drifts from src/ silently, and its lib/ is
      # gitignored anyway, so the in-repo jar could never run from a checkout.
      # What gets deployed is now what CI built and tested, from a known commit.
      # jar + lib/ travel together — the jar's manifest Class-Path is relative.
      - name: upload deployable
        uses: actions/upload-artifact@v4
        with:
          name: backend-dawn-${{ github.sha }}
          path: |
            backend-dawn/backend-dawn.jar
            backend-dawn/lib/
          if-no-files-found: error
          retention-days: 30

  # The FastAPI backend is retired from serving (M6 moved every route to Dawn on
  # :8001) but it is not dead code: it is the emergency rollback target —
  # deploy/rollback-to-fastapi.sh points nginx back at uvicorn :8000, against the
  # same DB. A rollback target nothing exercises is not a rollback target, it is
  # a guess. It also remains the reference implementation the contract_*.py
  # scripts diff the Dawn backend against.
  python-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 3.10, not latest: production is Ubuntu 22.04, whose python3 is 3.10, and
      # the code is held to that baseline. Testing on newer tests what does not ship.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: install
        run: pip install -r requirements.txt
        working-directory: backend

      # The simple-tokenizer test (2-char CJK + pinyin — the reason the extension
      # was chosen at all) skips everywhere else: the .so is deliberately not in
      # git, and neither the dev laptop nor the server can reach GitHub releases.
      # A runner can, so this is the one place that assertion ever runs.
      # Not fatal if it flakes: the test skips itself when the .so is absent.
      - name: fetch the simple fts extension
        run: python scripts/fetch_simple_ext.py
        working-directory: backend
        continue-on-error: true

      # -rs so a skip is visible in the log rather than a silent dot.
      - name: tests
        run: pytest -rs
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # npm ci, not install: it fails loudly when the lockfile and package.json
      # disagree, which is the whole point of having the lockfile committed.
      - name: install
        run: npm ci
        working-directory: frontend

      - name: build
        run: npm run build
        working-directory: frontend
