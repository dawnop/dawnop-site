# dav.dawnop.com 的 WebDAV Basic 鉴权失败过滤器。
# 配套：nginx 站点配置（在 ~/workspace/dawnop-ops/）里 dav vhost 的 dawnop_dav 日志格式（改一边必须改另一边）。
#
# 只认「401 且请求带了 Authorization」。**不能只看 401**：不带凭证的 401 是 Basic 鉴权
# 的正常挑战（客户端首次访问 realm 必然产生一条），封它等于封掉每一个正常挂载。带了凭证
# 还回 401 才是「凭证被拒」——也正是烧掉一次 bcrypt 的那批请求。
#
# 匹配的一行长这样（末尾的 auth= 由 nginx 的 map $http_authorization 产出，只有存在性，
# 没有凭证值）：
#   1.2.3.4 - - [17/Jul/2026:12:00:00 +0800] "PROPFIND / HTTP/1.1" 401 30 "-" "rclone/v1.65" auth=auth
#
# 两处是实测定的，别"收紧"回去：
#   - $remote_user 位置用 .* 而非 \S+：nginx 会把 Basic 里的用户名原样写进这一栏，**空格不转义**
#     （实测发 "ad min user:p" 落盘就是 `- ad min user [`）。用 \S+ 的话，攻击者只要在用户名里
#     加个空格就整行不匹配 —— 白送一个绕过封禁的开关。
#   - 其余字段用 "[^"]*" 而非 .*：引号会被 nginx 转义成 \x22（实测把 `" 401 9 "-" "z" auth=auth`
#     塞进 User-Agent/用户名，落盘全是 \x22），故引号是可信的字段边界，攻击者拼不出假的
#     `401 ... auth=auth` 尾巴来诬陷别人的 IP。

[Definition]

# 注意 `\[\]` 里是空的：fail2ban 会先按 datepattern 把时间戳从行里**抠掉**再拿 failregex
# 去匹配剩下的部分，于是 [17/Jul/2026:21:20:03 +0800] 到这里只剩一对空方括号。写成
# \[[^\]]+\] 会一条都匹配不上（实测 0 matched）。fail2ban 自带的 nginx-* 过滤器同此写法。
failregex = ^<HOST> - .* \[\] "[A-Z]+ [^"]*" 401 \d+ "[^"]*" "[^"]*" auth=auth\s*$

# 兜底：凡是没带凭证的行（含正常的 401 挑战）一律不计数。failregex 已经排除了它们，
# 这条是明写出来的护栏——将来谁放宽 failregex，也不会一步踩进「封掉所有正常挂载」。
ignoreregex = ^.* auth=noauth\s*$

# 不设 datepattern：交给 fail2ban 的默认探测器在整行里找时间戳。
# 别改回 `datepattern = ^[^\[]*\[({DATE})` 那种从行首锚定的写法——用户名同样会被原样写进日志，
# 攻击者用 "x[y" 当用户名就能让 [^\[]* 提前止步、时间戳解析失败、整行被跳过（实测：自定义
# datepattern 下该行 0 matched，去掉后 1 matched）。默认探测器不受用户名影响。
