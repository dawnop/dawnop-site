# WebDAV（dav.dawnop.com）Basic 鉴权爆破封禁。
# 安装与验证见 deploy/fail2ban/README.md。已有的 sshd jail 不受影响（各自独立文件）。
#
# enabled = true —— 已于 2026-07-18 装到生产并生效。此前被 gate 的原因（$remote_addr 恒为
# 127.0.0.1、会封到 SNI 分流层自己）已由 proxy_protocol 解除（2026-07-17），dav 日志现在记的是
# 真实客户端 IP、且带 auth=auth/noauth 标记（见 deploy/nginx.conf 的 dawnop_dav 格式与
# deploy/real-ip-proxy-protocol.md）。filter 已用真日志 + fail2ban-regex 验证过。

[dawnop-dav-auth]
enabled  = true
filter   = dawnop-dav-auth
port     = http,https
logpath  = /var/log/nginx/dav.access.log

# backend 必须显式写：Debian/Ubuntu 的 /etc/fail2ban/jail.d/defaults-debian.conf 在 [DEFAULT] 里
# 设了 `backend = systemd`，**作用于所有 jail**。继承它的话，这个 jail 会去读 journald、
# 把上面的 logpath 完全忽略——nginx 日志一行都不会被解析，jail 状态永远 0 failed，
# 而且**不报任何错**（实测：不写这行时 `fail2ban-client -d` 里本 jail 没有任何 logpath 项）。
# sshd jail 走 journald 是对的，它不受这里影响。
backend  = auto

# 数字按「单管理员服务」定：
#   maxretry=5 / findtime=10m —— 正常用户只有一个人，密码存在客户端里，稳态下**一次失败都
#     不该有**。留 5 次是给「挂载时手输密码打错」留余量：客户端（Finder/rclone）一次输错
#     往往自动重试 1-2 次，5 次约等于容忍两次手滑，第三次就该停下来查密码了。
#   bantime=1h —— 这里封的是 CPU 耗尽 + 爆破：把攻击者压到 5 次/小时，bcrypt 面下的口令
#     爆破在几何量级上就没意义了，不需要更长。而封错人的代价是管理员自己挂载不上，1h 短到
#     可以等、也随时能手工 unban（README 有），故不用 findtime/bantime 一路加码。
maxretry = 5
findtime = 10m
bantime  = 1h
