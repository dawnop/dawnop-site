# gzip 压缩（放到 /etc/nginx/conf.d/gzip.conf）。
# 注意：Ubuntu 默认 nginx.conf 的 http 块已有 `gzip on;`，这里**不要**重复声明，
# 否则 `nginx -t` 报 "gzip directive is duplicate"。这里只补类型与参数。
#
# 安装：sudo cp deploy/gzip.conf /etc/nginx/conf.d/gzip.conf && sudo nginx -t && sudo systemctl reload nginx
#
# 效果：JS/CSS 默认不被 nginx 压缩（默认只压 text/html），加上 gzip_types 后
# 首屏入口 JS 由 ~600KB 降到 ~190KB、CSS 由 ~310KB 降到 ~40KB。

gzip_vary on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_proxied any;
gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml application/wasm font/ttf font/woff2;
