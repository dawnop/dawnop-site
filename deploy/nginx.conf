# dawnop-site Nginx 配置
# 形态：Nginx 监听 80，托管前端静态文件（frontend/dist），并把 /api 反代到本地 uvicorn。
#
# 部署步骤（Ubuntu 22.04）：
#   1) 本地 `cd frontend && npm run build`，把生成的 dist/ 传到服务器，例如 /var/www/dawnop/dist
#   2) 后端用 systemd 跑 uvicorn（见 deploy/dawnop-backend.service），监听 127.0.0.1:8000
#   3) 把本文件放到 /etc/nginx/sites-available/dawnop，并软链到 sites-enabled：
#        sudo ln -s /etc/nginx/sites-available/dawnop /etc/nginx/sites-enabled/dawnop
#        sudo nginx -t && sudo systemctl reload nginx
#   4) 按需修改下面的 server_name 与 root 路径

server {
    listen 80;
    listen [::]:80;
    server_name dawnop.com www.dawnop.com;

    # 前端构建产物目录（把 frontend/dist 传到这里）
    root /var/www/dawnop/dist;
    index index.html;

    # 上传/导入接口需要的请求体上限（如 .md 导入、后端代理上传）。
    # 注意：文件上传走的是前端直传七牛，不经过 Nginx，这里主要给 API JSON 留余量。
    client_max_body_size 32m;

    # 后端 API：反代到本地 uvicorn。/api 前缀与前端 axios baseURL 一致。
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 预览/下载是 302 跳到七牛，无需 Nginx 缓冲大文件
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # 带哈希指纹的静态资源（Vite 产物在 /assets/ 下）可长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA 回退：history 路由下，任意未匹配到文件的路径都返回 index.html，
    # 交给前端 vue-router 处理（否则刷新 /article/xxx 会 404）。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 不缓存，保证发新版本后客户端能拿到最新的 assets 引用
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    access_log /var/log/nginx/dawnop.access.log;
    error_log  /var/log/nginx/dawnop.error.log;
}

# HTTPS 上线时（绑定证书后）的参考片段：
#   - 再加一个 listen 443 ssl 的 server 块，配 ssl_certificate / ssl_certificate_key；
#   - 把上面的 80 端口 server 改成 301 跳转到 https。
#   - 注意七牛私有空间也需绑定自定义 HTTPS 域名，否则 https 站点下 http 签名 URL 会被混合内容拦截。
