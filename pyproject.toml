# Ruff config for every .py in the repo (backend/, backend-dawn/scripts/, deploy/).
# There is no Python package to build here — this file exists for tool config only.

[tool.ruff]
# 3.10, matching production (Ubuntu 22.04). This is what stops a 3.11+ construct
# from passing review on a 3.14 laptop and dying on the server.
target-version = "py310"
line-length = 88
extend-exclude = ["frontend", ".venv", "backend/extensions"]

[tool.ruff.lint]
# E4/E7/E9+F is ruff's default (import mess, real syntax/name errors). Added:
#   I  — import sorting, so import blocks stop drifting
#   B  — bugbear: mutable default args, except-without-from, zip without strict
#   UP — pyupgrade, held to target-version above
select = ["E4", "E7", "E9", "F", "I", "B", "UP"]

# B008 fires on every FastAPI route: `db: Session = Depends(get_db)` and
# `Query(...)` in defaults are the framework's prescribed idiom, not the bug
# bugbear is describing (82 hits here, all of them Depends/Query).
ignore = ["B008"]
